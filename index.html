<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>行业分析智能体</title>
  <style>
    :root {
      --bg: #0b1220;
      --card: #111a2e;
      --text: #e7ecf7;
      --muted: #9fb0d1;
      --primary: #4f8cff;
      --primary-hover: #3d79ea;
      --danger: #ff5a7a;
      --border: #253252;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at 20% 0%, #17233d, var(--bg) 40%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: linear-gradient(180deg, #131f39, var(--card));
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.35);
      padding: 22px;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .avatar-wrap {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .title-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid rgba(147, 197, 253, 0.65);
      box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.18);
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .title-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .avatar-switch {
      background: #1a2745;
      color: var(--text);
      border: 1px solid #2b3b63;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
    }

    label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
      display: block;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      background: #0f172a;
      border: 1px solid #2b3b63;
      color: var(--text);
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      resize: vertical;
    }

    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.18);
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color .2s, transform .05s;
    }

    button:active { transform: translateY(1px); }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover { background: var(--primary-hover); }

    .btn-ghost {
      background: #1a2745;
      color: var(--text);
      border: 1px solid #2b3b63;
    }

    .status {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
    }

    .status.error { color: var(--danger); }
    .status.ok { color: #6ee7b7; }

    .result {
      margin: 10px 0 0;
      background: #0b1326;
      border: 1px solid #253252;
      border-radius: 10px;
      padding: 14px;
      min-height: 54px;
      display: flex;
      align-items: center;
      color: #dbe7ff;
      word-break: break-all;
    }

    .result-link {
      color: #93c5fd;
      text-decoration: underline;
      text-underline-offset: 2px;
      font-size: 13px;
      line-height: 1.6;
    }

    .result-empty {
      color: var(--muted);
      font-size: 13px;
    }

    .result-placeholder {
      color: transparent;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title-row">
      <div class="avatar-wrap">
        <div class="title-avatar" id="titleAvatarTrigger" title="点击更换图像">
          <img id="titleAvatarImg" src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=200&q=80" alt="行业分析图标" />
        </div>
        <input id="avatarFileInput" type="file" accept="image/*" style="display:none;" />
      </div>
      <h1>行业分析智能体</h1>
    </div>

    <div>
      <label for="industryInput">请输入行业名称</label>
      <textarea id="industryInput" placeholder="例如：新能源汽车"></textarea>
    </div>

    <div class="actions">
      <button id="sendBtn" class="btn-primary">发送请求</button>
      <button id="clearBtn" class="btn-ghost">清空结果</button>
    </div>

    <div id="status" class="status">等待发送请求...</div>
    <div id="output" class="result"><span class="result-placeholder">.</span></div>

  </div>

  <script>
    const API_URL = "/api/run";

    const industryInputEl = document.getElementById("industryInput");
    const statusEl = document.getElementById("status");
    const outputEl = document.getElementById("output");
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");
    const titleAvatarImg = document.getElementById("titleAvatarImg");
    const titleAvatarTrigger = document.getElementById("titleAvatarTrigger");
    const avatarFileInput = document.getElementById("avatarFileInput");

    function setStatus(text, type = "") {
      statusEl.textContent = text;
      statusEl.className = `status ${type}`.trim();
    }

    function renderEmpty() {
      outputEl.innerHTML = '<span class="result-placeholder">.</span>';
    }

    function renderLink(url) {
      outputEl.innerHTML = `<a class="result-link" href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
    }

    titleAvatarTrigger.addEventListener("click", () => {
      avatarFileInput.click();
    });

    avatarFileInput.addEventListener("change", () => {
      const file = avatarFileInput.files && avatarFileInput.files[0];
      if (!file) {
        return;
      }

      const objectUrl = URL.createObjectURL(file);
      titleAvatarImg.src = objectUrl;
      setStatus("图标已切换", "ok");

      avatarFileInput.value = "";
    });

    sendBtn.addEventListener("click", async () => {
      const industry_name = industryInputEl.value.trim();

      if (!industry_name) {
        setStatus("industry_name 为必填，请输入行业名称", "error");
        return;
      }

      const payload = { industry_name };
      renderEmpty();

      setStatus("生成中... 同志你好，预计需要等待四分钟左右", "");
      sendBtn.disabled = true;
      sendBtn.textContent = "生成中...";

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(payload),
        });

        const text = await response.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch {
          data = { raw: text };
        }

        const reportUrl = data && data.report_url;

        if (response.ok && reportUrl) {
          renderLink(reportUrl);
          setStatus(`请求成功，HTTP ${response.status}`, "ok");
        } else {
          renderEmpty();
          setStatus(`请求失败，HTTP ${response.status}`, "error");
        }
      } catch (err) {
        renderEmpty();
        setStatus(`请求异常：${err.message}`, "error");
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = "发送请求";
      }
    });

    clearBtn.addEventListener("click", () => {
      renderEmpty();
      setStatus("已清空结果", "");
    });
  </script>
</body>
</html>
